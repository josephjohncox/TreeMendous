name: Exact-batch production evidence

on:
  pull_request:
    paths:
      - ".github/workflows/exact-batch-evidence.yml"
      - "docs/benchmarking.md"
      - "docs/exact-batch.md"
      - "Justfile"
      - "MANIFEST.in"
      - "pyproject.toml"
      - "scripts/verify_exact_batch_benchmark.py"
      - "scripts/verify_exact_batch_scaling.py"
      - "scripts/verify_mutation_attribution.py"
      - "setup.py"
      - "setup_gpu.py"
      - "setup_metal.py"
      - "tests/performance/**"
      - "tests/unit/test_exact_batch_benchmark_artifact.py"
      - "tests/unit/test_exact_batch_scaling_artifact.py"
      - "tests/unit/test_exact_batch.py"
      - "tests/unit/test_mutation_attribution.py"
      - "treemendous/**"
      - "uv.lock"
  workflow_dispatch:
    inputs:
      baseline-ref:
        description: Clean scalar-attribution baseline ref
        required: true
        default: main
        type: string

permissions:
  contents: read

jobs:
  evidence:
    name: Exact batch and scoped scalar gate
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    env:
      EXACT_SAMPLES: "30"
      SCALAR_SAMPLES: "30"
      SCALING_SAMPLES: "30"
      OUTPUT_DIR: build/benchmarks/exact-batch-evidence
      EXACT_JSON: build/benchmarks/exact-batch-evidence/exact-batch.json
      SCALAR_JSON: build/benchmarks/exact-batch-evidence/scalar-attribution.json
      SCALING_JSON: >-
        build/benchmarks/exact-batch-evidence/exact-batch-scaling.json
      TREE_MENDOUS_BUILD_COMMAND: >-
        uv run --frozen --no-sync python setup.py build_ext --inplace --force
    steps:
      # actions/checkout v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      # astral-sh/setup-uv v6
      - uses: astral-sh/setup-uv@d0d8abe699bfb85fec6de9f7adb5ae17292296ff
        with:
          version: "0.8.7"
          python-version: "3.12"
          enable-cache: true

      - name: Resolve immutable candidate and clean baseline
        id: revisions
        shell: bash
        env:
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          DISPATCH_BASE_REF: ${{ inputs.baseline-ref }}
        run: |
          set -euo pipefail
          candidate=$(git rev-parse HEAD)
          test -z "$(git status --porcelain)"
          if [[ "$GITHUB_EVENT_NAME" == "pull_request" ]]; then
            baseline=$(git rev-parse "$PR_BASE_SHA^{commit}")
          else
            git fetch --no-tags origin "$DISPATCH_BASE_REF"
            baseline=$(git rev-parse "FETCH_HEAD^{commit}")
          fi
          test "$baseline" != "$candidate"
          baseline_root="$RUNNER_TEMP/treemendous-baseline"
          rm -rf "$baseline_root"
          git worktree add --detach "$baseline_root" "$baseline"
          test "$(git -C "$baseline_root" rev-parse HEAD)" = "$baseline"
          test -z "$(git -C "$baseline_root" status --porcelain)"
          {
            echo "candidate=$candidate"
            echo "baseline=$baseline"
            echo "baseline_root=$baseline_root"
          } >> "$GITHUB_OUTPUT"

      - name: Install locked build, quality, and test dependencies
        run: |
          uv lock --check
          uv sync --frozen --extra build --extra quality --extra test

      - name: Build native CPU extensions
        run: >-
          uv run --frozen --no-sync python setup.py build_ext --inplace --force

      - name: Run focused correctness and evidence contracts
        run: >-
          uv run --frozen --no-sync pytest -q
          tests/unit/test_exact_batch.py
          tests/performance/test_exact_batch_benchmark.py
          tests/unit/test_exact_batch_benchmark_artifact.py
          tests/unit/test_exact_batch_scaling_artifact.py

      - name: Generate exact-batch evidence
        shell: bash
        run: |
          set -euo pipefail
          rm -rf "$OUTPUT_DIR"
          mkdir -p "$OUTPUT_DIR"
          uv run --frozen --no-sync python \
            -m tests.performance.exact_batch_benchmark \
            --samples "$EXACT_SAMPLES" \
            --target-operations 20000 \
            --output "$EXACT_JSON" \
            --enforce-hard-gates

      - name: Generate correctness-attested scaling evidence
        run: >-
          uv run --frozen --no-sync python
          -m tests.performance.exact_batch_scaling
          --samples "$SCALING_SAMPLES"
          --output "$SCALING_JSON"
          --enforce-gate

      - name: Generate bounded quick scalar attribution
        shell: bash
        env:
          BASELINE_ROOT: ${{ steps.revisions.outputs.baseline_root }}
        run: |
          set -euo pipefail
          uv run --frozen --no-sync python \
            -m tests.performance.mutation_attribution \
            --baseline-root "$BASELINE_ROOT" \
            --candidate-root "$GITHUB_WORKSPACE" \
            --samples "$SCALAR_SAMPLES" \
            --warmups 1 \
            --quick \
            --output "$SCALAR_JSON"

      - name: Verify structure, bindings, and fixed gates
        id: verify
        shell: bash
        env:
          CANDIDATE_SHA: ${{ steps.revisions.outputs.candidate }}
          BASELINE_SHA: ${{ steps.revisions.outputs.baseline }}
          BASELINE_ROOT: ${{ steps.revisions.outputs.baseline_root }}
        run: |
          set -euo pipefail
          uv run --frozen --no-sync python \
            -m scripts.verify_mutation_attribution "$SCALAR_JSON" \
            --expected-baseline "$BASELINE_SHA" \
            --expected-candidate "$CANDIDATE_SHA" \
            --require-samples "$SCALAR_SAMPLES"
          uv run --frozen --no-sync python \
            -m scripts.verify_exact_batch_benchmark "$EXACT_JSON" \
            --expected-baseline "$BASELINE_SHA" \
            --expected-candidate "$CANDIDATE_SHA" \
            --require-samples "$EXACT_SAMPLES" \
            --require-scalar-samples "$SCALAR_SAMPLES" \
            --scalar-attribution "$SCALAR_JSON" \
            --enforce-gates
          uv run --frozen --no-sync python \
            -m scripts.verify_exact_batch_scaling "$SCALING_JSON" \
            --expected-candidate "$CANDIDATE_SHA" \
            --require-samples "$SCALING_SAMPLES" \
            --enforce-gate
          test "$(find "$OUTPUT_DIR" -maxdepth 1 -type f | wc -l)" -eq 9
          test "$(git rev-parse HEAD)" = "$CANDIDATE_SHA"
          test -z "$(git status --porcelain --untracked-files=no)"
          test "$(git -C "$BASELINE_ROOT" rev-parse HEAD)" = "$BASELINE_SHA"
          test -z "$(git -C "$BASELINE_ROOT" status \
            --porcelain --untracked-files=no)"
          exact_digest=$(cut -d ' ' -f 1 "$EXACT_JSON.sha256")
          scalar_digest=$(cut -d ' ' -f 1 "$SCALAR_JSON.sha256")
          scaling_digest=$(cut -d ' ' -f 1 "$SCALING_JSON.sha256")
          {
            echo "exact_digest=$exact_digest"
            echo "scalar_digest=$scalar_digest"
            echo "scaling_digest=$scaling_digest"
          } >> "$GITHUB_OUTPUT"

      # actions/upload-artifact v4
      - name: Upload verified exact-batch evidence
        id: upload
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: >-
            exact-batch-evidence-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            build/benchmarks/exact-batch-evidence/exact-batch.json
            build/benchmarks/exact-batch-evidence/exact-batch.md
            build/benchmarks/exact-batch-evidence/exact-batch.json.sha256
            build/benchmarks/exact-batch-evidence/scalar-attribution.json
            build/benchmarks/exact-batch-evidence/scalar-attribution.md
            build/benchmarks/exact-batch-evidence/scalar-attribution.json.sha256
            build/benchmarks/exact-batch-evidence/exact-batch-scaling.json
            build/benchmarks/exact-batch-evidence/exact-batch-scaling.md
            build/benchmarks/exact-batch-evidence/exact-batch-scaling.json.sha256
          if-no-files-found: error
          retention-days: 90
          compression-level: 6

      - name: Publish verified gate summary
        shell: bash
        env:
          CANDIDATE_SHA: ${{ steps.revisions.outputs.candidate }}
          BASELINE_SHA: ${{ steps.revisions.outputs.baseline }}
          EXACT_DIGEST: ${{ steps.verify.outputs.exact_digest }}
          SCALAR_DIGEST: ${{ steps.verify.outputs.scalar_digest }}
          SCALING_DIGEST: ${{ steps.verify.outputs.scaling_digest }}
          ARTIFACT_URL: ${{ steps.upload.outputs.artifact-url }}
          ARTIFACT_DIGEST: ${{ steps.upload.outputs.artifact-digest }}
        run: |
          uv run --frozen --no-sync python - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import json
          import os
          from pathlib import Path

          exact = json.loads(Path(os.environ["EXACT_JSON"]).read_text())
          scalar = json.loads(Path(os.environ["SCALAR_JSON"]).read_text())
          scaling = json.loads(Path(os.environ["SCALING_JSON"]).read_text())
          public = scalar["layers"]["rangeset_public"]
          gates = exact["gates"]
          print("## Verified stable exact-batch evidence\n")
          print(f"- Candidate: `{os.environ['CANDIDATE_SHA']}`")
          print(f"- Scalar baseline: `{os.environ['BASELINE_SHA']}`")
          workload_digest = exact["workload_manifest"]["digest"]
          print(f"- Restorative workload digest: `{workload_digest}`")
          print(f"- Exact JSON SHA-256: `{os.environ['EXACT_DIGEST']}`")
          print(f"- Scalar JSON SHA-256: `{os.environ['SCALAR_DIGEST']}`")
          print(f"- Scaling JSON SHA-256: `{os.environ['SCALING_DIGEST']}`")
          scaling_workload = scaling["workload_manifest"]["digest"]
          print(f"- Scaling workload digest: `{scaling_workload}`")
          print(f"- GitHub artifact digest: `{os.environ['ARTIFACT_DIGEST']}`")
          print(f"- [Download verified evidence]({os.environ['ARTIFACT_URL']})")
          print("\n| Gate | Lower/upper 95% bound | Threshold |")
          print("|---|---:|---:|")
          batch4 = gates["break_even_by_4"]["observed"]
          batch16 = gates["batch16_speedup"]["observed"]
          throughput = gates["batch16_absolute"]["observed"]
          scalar_upper = public["confidence_95_ratio"][1]
          scaling_upper = scaling["gates"]["production_envelope"][
              "observed_upper_95_ns"
          ] / 1_000_000
          print(f"| Batch 4 speedup | {batch4:.4f} | >= 1.0 |")
          print(f"| Batch 16 speedup | {batch16:.4f} | >= 2.0 |")
          print(f"| Batch 16 ops/s | {throughput:.0f} | >= 2000000 |")
          print(
              f"| Stable scalar candidate/baseline | {scalar_upper:.4f} "
              "| <= 1.03 |"
          )
          print(
              f"| 100,000 intervals batch-16 latency (ms) | "
              f"{scaling_upper:.3f} | <= 10.0 |"
          )
          print(
              "\nQuick attribution scopes only the stable `rangeset_public` "
              "regression gate; it is not full scalar-promotion evidence."
          )
          PY
