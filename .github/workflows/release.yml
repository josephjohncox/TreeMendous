name: Build and publish release

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  version:
    name: Release tag matches project version
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # actions/checkout v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      # actions/setup-python v5
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
      - name: Require v<project.version> release tag
        shell: bash
        run: |
          version=$(python -c '
          import tomllib
          with open("pyproject.toml", "rb") as stream:
              project = tomllib.load(stream)
          print(project["project"]["version"])
          ')
          expected="v${version}"
          if [[ "$GITHUB_REF_NAME" != "$expected" ]]; then
            echo "Release tag mismatch: expected $expected;" \
              "got $GITHUB_REF_NAME" >&2
            exit 1
          fi

  audit:
    name: Audit release build/test/quality and core runtime dependencies
    needs: version
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      # actions/checkout v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      # astral-sh/setup-uv v6
      - uses: astral-sh/setup-uv@d0d8abe699bfb85fec6de9f7adb5ae17292296ff
        with:
          python-version: "3.12"
          enable-cache: false
      - run: uv sync --frozen --extra build --extra quality --extra test
      - run: uv lock --check
      - name: Build native CPU extensions for release audit
        run: >-
          uv run --frozen --no-sync python setup.py
          build_ext --inplace --force
      - name: Enforce Ruff formatting and lint
        run: |
          uv run --frozen --no-sync ruff format --check .
          uv run --frozen --no-sync ruff check .
      - name: Enforce package typing
        run: uv run --frozen --no-sync mypy treemendous
      - name: Run focused stable exact-batch tests
        run: >-
          uv run --frozen --no-sync pytest -q
          tests/unit/test_exact_batch.py
          tests/unit/test_exact_batch_contract.py
      - name: Run full non-hardware tests
        run: >-
          uv run --frozen --no-sync pytest -q
          -m "not benchmark and not cuda and not metal and not icl"
      - name: Run documentation and packaging contracts explicitly
        run: >-
          uv run --frozen --no-sync pytest -q
          tests/docs tests/packaging/test_artifact_policy.py
          tests/packaging/test_repository_layout.py
      - name: Compile maintained Python sources
        run: >-
          uv run --frozen --no-sync python -m compileall -q
          treemendous tests scripts setup.py setup_gpu.py setup_metal.py
      - run: uv run --frozen --no-sync pip-audit --skip-editable
      - name: Audit core runtime dependency export
        shell: bash
        run: |
          uv export --frozen --no-dev --no-emit-project \
            --output-file /tmp/treemendous-core-requirements.txt
          uv run --frozen --no-sync pip-audit \
            --requirement /tmp/treemendous-core-requirements.txt

  exact-batch-evidence:
    name: Exact-batch evidence against v1.0.0
    needs: version
    uses: ./.github/workflows/exact-batch-evidence.yml
    with:
      baseline-ref: v1.0.0

  sdist:
    name: Build the only sdist
    needs: [version, audit]
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      # actions/checkout v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      # astral-sh/setup-uv v6
      - uses: astral-sh/setup-uv@d0d8abe699bfb85fec6de9f7adb5ae17292296ff
        with:
          python-version: "3.12"
          enable-cache: false
      - run: uv sync --frozen --extra build --extra quality --extra test
      - run: uv build --sdist --out-dir artifacts
      - run: >-
          uv run --frozen --no-sync python
          -m scripts.verify_artifact_contents artifacts
      - name: Clean-install sdist and smoke stable APIs from arbitrary CWD
        shell: bash
        run: |
          sdist=$(find artifacts -name '*.tar.gz' -print -quit)
          TREEMENDOUS_SDIST="$PWD/$sdist" \
            uv run --frozen --no-sync pytest \
            tests/packaging/test_sdist_install.py -q
      # actions/upload-artifact v4
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: release-sdist
          path: artifacts/*.tar.gz
          if-no-files-found: error

  wheels:
    name: Wheel / ${{ matrix.os }} / Python ${{ matrix.python }}
    needs: [version, audit]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 75
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python: "3.11"
            cibw-build: cp311-manylinux_x86_64
          - os: ubuntu-latest
            python: "3.12"
            cibw-build: cp312-manylinux_x86_64
          - os: ubuntu-latest
            python: "3.13"
            cibw-build: cp313-manylinux_x86_64
          - os: macos-latest
            python: "3.11"
          - os: macos-latest
            python: "3.12"
          - os: macos-latest
            python: "3.13"
          - os: windows-latest
            python: "3.11"
          - os: windows-latest
            python: "3.12"
          - os: windows-latest
            python: "3.13"
    steps:
      # actions/checkout v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      # astral-sh/setup-uv v6
      - uses: astral-sh/setup-uv@d0d8abe699bfb85fec6de9f7adb5ae17292296ff
        with:
          python-version: ${{ matrix.python }}
          enable-cache: false
      - run: uv sync --frozen --extra build --extra quality --extra test
      - name: Build repaired manylinux CPU wheel
        if: runner.os == 'Linux'
        # pypa/cibuildwheel v2.23.3
        uses: pypa/cibuildwheel@1b198eb0fd40daf384929579c8a9eafdcc4a41cc
        env:
          CIBW_BUILD: ${{ matrix.cibw-build }}
          CIBW_ARCHS_LINUX: x86_64
        with:
          package-dir: .
          output-dir: artifacts
      - name: Build Windows portable CPU wheel
        if: runner.os == 'Windows'
        run: uv build --wheel --out-dir artifacts
      - name: Require the Xcode Metal compiler
        if: runner.os == 'macOS'
        run: xcrun -f metal
      - name: Build macOS CPU plus experimental Metal wheel
        if: runner.os == 'macOS'
        env:
          MACOSX_DEPLOYMENT_TARGET: "12.0"
        run: >-
          uv run --frozen --no-sync python setup_metal.py
          bdist_wheel --dist-dir artifacts
      - name: Verify repaired manylinux wheel only
        if: runner.os == 'Linux'
        run: >-
          uv run --frozen --no-sync python -m scripts.verify_artifact_contents
          --require-manylinux artifacts
      - name: Verify platform wheel
        if: runner.os != 'Linux'
        run: >-
          uv run --frozen --no-sync python
          -m scripts.verify_artifact_contents artifacts
      - name: Clean install and arbitrary-CWD smoke
        shell: bash
        run: |
          wheel=$(find artifacts -name '*.whl' -print -quit)
          TREEMENDOUS_WHEEL="$PWD/$wheel" \
            uv run --frozen --no-sync pytest \
            tests/packaging/test_wheel_install.py -q
      # actions/upload-artifact v4
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: wheel-${{ matrix.os }}-py${{ matrix.python }}
          path: artifacts/*.whl
          if-no-files-found: error

  verify-release:
    name: Aggregate and verify release artifacts
    needs: [sdist, wheels]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      # actions/checkout v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      # astral-sh/setup-uv v6
      - uses: astral-sh/setup-uv@d0d8abe699bfb85fec6de9f7adb5ae17292296ff
        with:
          python-version: "3.12"
          enable-cache: false
      - run: uv sync --frozen --extra build --extra quality --extra test
      # actions/download-artifact v4
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: release-sdist
          path: release-artifacts
      # actions/download-artifact v4
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          pattern: wheel-*
          path: release-artifacts
          merge-multiple: true
      - name: Require exactly one source distribution
        shell: bash
        run: |
          count=$(find release-artifacts -name '*.tar.gz' | wc -l | tr -d ' ')
          test "$count" = 1
      - run: >-
          uv run --frozen --no-sync python
          -m scripts.verify_artifact_contents release-artifacts
      # actions/upload-artifact v4
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: verified-release
          path: release-artifacts/
          if-no-files-found: error

  publish:
    name: Trusted publisher (single upload authority)
    needs: [verify-release, exact-batch-evidence]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: pypi
      url: https://pypi.org/p/treemendous
    permissions:
      id-token: write
    steps:
      # actions/download-artifact v4
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: verified-release
          path: dist
      # pypa/gh-action-pypi-publish v1.13.0
      - uses: >-
          pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e
        with:
          packages-dir: dist
