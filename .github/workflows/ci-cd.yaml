name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      cuda:
        description: Run the self-hosted CUDA hardware lane
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  quality:
    name: Ruff / mypy / branch coverage / docs
    runs-on: ubuntu-latest
    steps:
      # actions/checkout v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      # astral-sh/setup-uv v6
      - uses: astral-sh/setup-uv@d0d8abe699bfb85fec6de9f7adb5ae17292296ff
        with:
          python-version: "3.12"
          enable-cache: true
      - run: uv sync --extra build --extra quality --extra test
      - run: uv lock --check
      - name: Audit deliberate build/test/quality environment
        run: uv run --frozen --no-sync pip-audit --skip-editable
      - name: Audit core runtime dependency export
        shell: bash
        run: |
          uv export --frozen --no-dev --no-emit-project \
            --output-file /tmp/treemendous-core-requirements.txt
          uv run --frozen --no-sync pip-audit \
            --disable-pip --no-deps \
            --requirement /tmp/treemendous-core-requirements.txt
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run mypy treemendous
      - name: Branch coverage and strict test configuration
        run: >-
          uv run pytest
          -m "not benchmark and not cuda and not metal and not icl"
          --cov=treemendous --cov-branch --cov-config=pyproject.toml
          --cov-report=term-missing
      - name: Documentation and artifact policy contracts
        run: >-
          uv run pytest tests/docs tests/packaging/test_artifact_policy.py -q
      - name: Bytecode sanity
        run: >-
          uv run python -m compileall -q treemendous tests scripts
          setup.py setup_gpu.py setup_metal.py

  fast-python:
    name: Fast Python ${{ matrix.python }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ["3.11", "3.12", "3.13"]
    steps:
      # actions/checkout v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      # astral-sh/setup-uv v6
      - uses: astral-sh/setup-uv@d0d8abe699bfb85fec6de9f7adb5ae17292296ff
        with:
          python-version: ${{ matrix.python }}
          enable-cache: true
      - run: uv sync --extra build --extra quality --extra test
      - name: Pure Python contract tests
        run: >-
          uv run pytest tests/unit tests/test_boundary_summary_simple.py
          tests/test_summary_simple.py tests/test_treap_simple.py
          --ignore=tests/unit/test_native_core_contract.py
          --ignore=tests/unit/hypothesis/test_boundary_cpp.py
          --ignore=tests/unit/hypothesis/test_boundary_cpp_ic.py
          --ignore=tests/unit/hypothesis/test_treap_cpp.py
          -m "not metal and not cuda and not icl and not benchmark
          and not packaging"

  native-cpu:
    name: Native CPU / ${{ matrix.os }} / Python ${{ matrix.python }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.11", "3.13"]
    steps:
      # actions/checkout v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      # astral-sh/setup-uv v6
      - uses: astral-sh/setup-uv@d0d8abe699bfb85fec6de9f7adb5ae17292296ff
        with:
          python-version: ${{ matrix.python }}
          enable-cache: true
      - run: uv sync --extra build --extra quality --extra test
      - run: uv run python setup.py build_ext --inplace
      - name: Stable native contract
        run: >-
          uv run pytest tests/unit/test_native_core_contract.py
          tests/unit/test_core_contract.py
          tests/unit/test_stable_backends.py
          -m "not metal and not cuda and not icl and not benchmark
          and not packaging"

  native-sanitizers:
    name: Linux stable native ASan/UBSan/_GLIBCXX_DEBUG
    runs-on: ubuntu-latest
    env:
      TREE_MENDOUS_SANITIZERS: "1"
      TREE_MENDOUS_GLIBCXX_DEBUG: "1"
    steps:
      # actions/checkout v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      # astral-sh/setup-uv v6
      - uses: astral-sh/setup-uv@d0d8abe699bfb85fec6de9f7adb5ae17292296ff
        with:
          python-version: "3.12"
      - run: uv sync --extra build --extra quality --extra test
      - run: uv run python setup.py build_ext --inplace --force
      - name: Run native contracts under sanitizers
        shell: bash
        run: |
          asan_runtime=$(gcc -print-file-name=libasan.so)
          libstdcpp_runtime=$(g++ -print-file-name=libstdc++.so.6)
          # libasan initializes before Python imports the extension. Preload
          # libstdc++ too so ASan can resolve its __cxa_throw interceptor.
          export LD_PRELOAD="$asan_runtime:$libstdcpp_runtime"
          # CPython and pybind11 retain process-lifetime singletons.
          # This lane targets memory-safety and UB failures, not LSAN totals.
          export ASAN_OPTIONS=detect_leaks=0:halt_on_error=1
          export UBSAN_OPTIONS=halt_on_error=1:print_stacktrace=1
          uv run pytest tests/unit/test_native_core_contract.py \
            tests/unit/test_core_contract.py -q

  package:
    name: Source and wheel policy / Linux
    runs-on: ubuntu-latest
    needs: [quality, fast-python, native-cpu]
    steps:
      # actions/checkout v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      # astral-sh/setup-uv v6
      - uses: astral-sh/setup-uv@d0d8abe699bfb85fec6de9f7adb5ae17292296ff
        with:
          python-version: "3.12"
      - run: uv sync --extra build --extra quality --extra test
      - run: rm -rf build dist wheelhouse
      - run: uv build --sdist
      - run: uv run python scripts/verify_artifact_contents.py dist
      - run: uv build --wheel --out-dir wheelhouse dist/*.tar.gz
      - run: uv run python scripts/verify_artifact_contents.py wheelhouse
      - name: Artifact policy regressions
        run: uv run pytest tests/packaging/test_artifact_policy.py -q
      - name: Clean install from unrelated CWD
        shell: bash
        run: |
          wheel=$(find wheelhouse -name '*.whl' -print -quit)
          TREEMENDOUS_WHEEL="$PWD/$wheel" \
            uv run pytest tests/packaging/test_wheel_install.py -q
      # actions/upload-artifact v4
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: verified-linux-package
          path: |
            dist/*.tar.gz
            wheelhouse/*.whl

  metal-package:
    name: macOS Metal wheel/resource/device
    runs-on: macos-latest
    needs: native-cpu
    env:
      MACOSX_DEPLOYMENT_TARGET: "12.0"
    steps:
      # actions/checkout v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      # astral-sh/setup-uv v6
      - uses: astral-sh/setup-uv@d0d8abe699bfb85fec6de9f7adb5ae17292296ff
        with:
          python-version: "3.12"
      - run: uv sync --extra build --extra quality --extra test
      - name: Require the Xcode Metal compiler
        run: xcrun -f metal
      - run: rm -rf build dist
      - run: uv run python setup_metal.py bdist_wheel
      - run: uv run python scripts/verify_artifact_contents.py dist/*.whl
      - name: Metal clean-wheel test
        shell: bash
        run: |
          wheel=$(find dist -name '*.whl' -print -quit)
          TREEMENDOUS_WHEEL="$PWD/$wheel" TREEMENDOUS_REQUIRE_METAL=1 \
            uv run pytest tests/packaging/test_wheel_install.py -q
      - name: Build Metal extension in place for source contract tests
        run: uv run python setup_metal.py build_ext --inplace
      - name: Metal hardware contract
        env:
          TREEMENDOUS_METAL_HARDWARE_TEST: "1"
        run: uv run pytest -m metal tests/hardware -q

  cuda-hardware:
    if: github.event_name == 'workflow_dispatch' && inputs.cuda
    name: Experimental CUDA hardware gate
    runs-on: [self-hosted, linux, x64]
    steps:
      # actions/checkout v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      # astral-sh/setup-uv v6
      - uses: astral-sh/setup-uv@d0d8abe699bfb85fec6de9f7adb5ae17292296ff
        with:
          python-version: "3.12"
      - run: uv sync --extra build --extra quality --extra test
      - run: WITH_CUDA=1 uv run python setup_gpu.py build_ext --inplace
      - env:
          TREEMENDOUS_CUDA_HARDWARE_TEST: "1"
        run: uv run pytest -m cuda tests/hardware -q
      - env:
          TREEMENDOUS_CUDA_HARDWARE_TEST: "1"
        run: >-
          compute-sanitizer --tool memcheck --error-exitcode=1
          uv run pytest -m cuda tests/hardware -q
