name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      cuda:
        description: Run the self-hosted CUDA hardware lane
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  fast-python:
    name: Fast Python ${{ matrix.python }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: ${{ matrix.python }}
          enable-cache: true
      - run: uv sync --all-extras
      - name: Pure Python contract tests
        run: >-
          uv run pytest tests/unit tests/test_boundary_summary_simple.py
          tests/test_summary_simple.py tests/test_treap_simple.py
          --ignore=tests/unit/test_native_core_contract.py
          --ignore=tests/unit/hypothesis/test_boundary_cpp.py
          --ignore=tests/unit/hypothesis/test_boundary_cpp_ic.py
          --ignore=tests/unit/hypothesis/test_treap_cpp.py
          -m "not metal and not cuda and not icl and not benchmark
          and not packaging"

  native-cpu:
    name: Native CPU / ${{ matrix.os }} / Python ${{ matrix.python }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.11", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: ${{ matrix.python }}
          enable-cache: true
      - run: uv sync --all-extras
      - run: uv run python setup.py build_ext --inplace
      - name: Stable native contract
        run: >-
          uv run pytest tests/unit/test_native_core_contract.py
          tests/unit/test_core_contract.py
          tests/unit/test_unified_implementations.py
          -m "not metal and not cuda and not icl and not benchmark
          and not packaging"

  native-sanitizers:
    name: Linux stable native ASan/UBSan/_GLIBCXX_DEBUG
    runs-on: ubuntu-latest
    env:
      TREE_MENDOUS_SANITIZERS: "1"
      TREE_MENDOUS_GLIBCXX_DEBUG: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
      - run: uv sync --all-extras
      - run: uv run python setup.py build_ext --inplace --force
      - name: Run native contracts under sanitizers
        shell: bash
        run: |
          asan_runtime=$(gcc -print-file-name=libasan.so)
          export LD_PRELOAD="$asan_runtime"
          export ASAN_OPTIONS=detect_leaks=1:halt_on_error=1
          export UBSAN_OPTIONS=halt_on_error=1:print_stacktrace=1
          uv run pytest tests/unit/test_native_core_contract.py \
            tests/unit/test_core_contract.py -q

  package:
    name: Source and wheel policy / Linux
    runs-on: ubuntu-latest
    needs: [fast-python, native-cpu]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
      - run: uv sync --all-extras
      - run: rm -rf build dist wheelhouse
      - run: uv build --sdist
      - run: uv run python scripts/verify_artifact_contents.py dist
      - run: uv build --wheel --out-dir wheelhouse dist/*.tar.gz
      - run: uv run python scripts/verify_artifact_contents.py wheelhouse
      - name: Artifact policy regressions
        run: uv run pytest tests/packaging/test_artifact_policy.py -q
      - name: Clean install from unrelated CWD
        shell: bash
        run: |
          wheel=$(find wheelhouse -name '*.whl' -print -quit)
          TREEMENDOUS_WHEEL="$PWD/$wheel" \
            uv run pytest tests/packaging/test_wheel_install.py -q
      - uses: actions/upload-artifact@v4
        with:
          name: verified-linux-package
          path: |
            dist/*.tar.gz
            wheelhouse/*.whl

  metal-package:
    name: macOS Metal wheel/resource/device
    runs-on: macos-latest
    needs: native-cpu
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
      - run: uv sync --all-extras
      - run: rm -rf build dist
      - run: uv run python setup_metal.py bdist_wheel
      - run: uv run python scripts/verify_artifact_contents.py dist/*.whl
      - name: Metal clean-wheel test
        shell: bash
        run: |
          wheel=$(find dist -name '*.whl' -print -quit)
          TREEMENDOUS_WHEEL="$PWD/$wheel" TREEMENDOUS_REQUIRE_METAL=1 \
            uv run pytest tests/packaging/test_wheel_install.py -q
      - name: Metal hardware contract
        env:
          TREEMENDOUS_METAL_HARDWARE_TEST: "1"
        run: uv run pytest -m metal tests/hardware -q

  cuda-hardware:
    if: github.event_name == 'workflow_dispatch' && inputs.cuda
    name: Experimental CUDA hardware gate
    runs-on: [self-hosted, linux, x64]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
      - run: uv sync --all-extras
      - run: WITH_CUDA=1 uv run python setup_gpu.py build_ext --inplace
      - env:
          TREEMENDOUS_CUDA_HARDWARE_TEST: "1"
        run: uv run pytest -m cuda tests/hardware -q
      - env:
          TREEMENDOUS_CUDA_HARDWARE_TEST: "1"
        run: >-
          compute-sanitizer --tool memcheck --error-exitcode=1
          uv run pytest -m cuda tests/hardware -q
